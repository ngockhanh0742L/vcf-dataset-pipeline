datasets:
  # Add more VCF roots with another unique id, or use adapter: manifest for
  # datasets described by a CSV containing path,label,group_id.
  - id: vcf
    adapter: vcf
    root: data/vcf
    strict_layout: true

data:
  # Keep processed artifacts separate from raw input so this directory can be
  # uploaded directly with the Kaggle CLI.
  output_dir: output
  sequence_dir: output/sequences
  manifest_path: output/manifests/sequence_manifest.csv
  split_manifest_path: output/manifests/split_manifest.csv
  summary_path: output/manifests/dataset_summary.json
  fail_on_video_error: true
  # Lossless research profile. Expect a large Kaggle dataset.
  output_format: png
  jpeg_quality: 95
  resume: true

split:
  seed: 42
  strategy: balanced_hash
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  group_by: background_and_video_name

pipeline:
  # MediaPipe is CPU-bound. This laptop is benchmarked below before the full run.
  workers: 8
  candidate_fps: 15.0
  model_fps: 7.5
  seq_len: 24
  window_hop: 6
  image_size: 300
  max_sequences_per_video: 6
  checkpoint_every_videos: 25
  min_source_fps_warning: 15.0
  use_timestamp_sampling: true

face:
  detector: mediapipe
  model_selection: 1
  min_detection_confidence: 0.5
  select_largest_face: true
  min_face_box_ratio: 0.02
  crop_margin: 1.3
  max_consecutive_repairs: 1

quality:
  # VCF includes low-resolution/compressed samples. Record quality without
  # dropping them unless a clean subset is explicitly desired.
  enforce_thresholds: false
  min_blur: 60.0
  min_brightness: 35.0
  max_brightness: 225.0
  min_contrast: 10.0

motion:
  ssim_redundant_threshold: 0.995
  min_motion_score: 0.005
  max_duplicate_ratio: 0.25
  max_repair_ratio: 0.10
  max_missing_face_ratio: 0.0
